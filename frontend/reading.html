    <style>
        .simulator-container {
            display: none;
            gap: 24px;
            height: calc(100vh - 180px);
        }
        .pane {
            flex: 1;
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            overflow-y: auto;
            box-shadow: 0 4px 12px var(--shadow);
        }
        .text-content {
            font-size: 18px;
            line-height: 1.8;
            color: var(--text-main);
        }
        .question-block {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }
        .question-text {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .option-label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option-label:hover {
            background-color: var(--surface-secondary);
        }
        input[type="radio"] { accent-color: var(--primary); transform: scale(1.2); }
        
        .option-label.correct { background-color: #d4edda; border-color: #28a745; color: #155724; }
        .option-label.wrong { background-color: #f8d7da; border-color: #dc3545; color: #721c24; }
        [data-theme="dark"] .option-label.correct { background-color: #0e4429; border-color: #28a745; color: #d4edda; }
        [data-theme="dark"] .option-label.wrong { background-color: #4a1920; border-color: #dc3545; color: #f8d7da; }
        
        .explanation-box {
            margin-top: 12px;
            padding: 12px 16px;
            background-color: var(--primary-light);
            border-left: 4px solid var(--primary);
            border-radius: 4px;
            font-size: 14px;
            display: none;
        }
        .tooltip {
            position: absolute;
            background-color: var(--surface);
            border: 1px solid var(--accent);
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 4px 12px var(--shadow);
            z-index: 1000;
            display: none;
            min-width: 200px;
        }
        .tooltip-title { font-weight: bold; color: var(--primary); margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
        .tooltip-text { font-size: 14px; color: var(--text-main); margin-bottom: 4px; }
    </style>
</head>

    <script>
        const API_URL = "http://127.0.0.1:8000/api/v1";
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = 'login.html';
        }
        function applyHeaderProfile() {
            const profile = JSON.parse(localStorage.getItem('user_profile')) || {};
            const nameEl = document.getElementById('user-display-name');
            const letterEl = document.getElementById('avatar-letter');
            const imgEl = document.getElementById('header-avatar-img');
            if (nameEl && profile.firstName) nameEl.innerText = profile.firstName;
            if (letterEl && profile.firstName) letterEl.innerText = profile.firstName.charAt(0).toUpperCase();
            if (imgEl) {
                if (profile.avatar) {
                    imgEl.src = profile.avatar;
                    imgEl.style.display = 'block';
                    if (letterEl) letterEl.style.display = 'none';
                } else {
                    imgEl.style.display = 'none';
                    if (letterEl) letterEl.style.display = '';
                }
            }
        }

        async function fetchUserProfile() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    const profile = JSON.parse(localStorage.getItem('user_profile')) || {};
                    const apiName = result.data.full_name;
                    if (!profile.firstName && apiName) {
                        profile.firstName = apiName.split(' ')[0];
                        localStorage.setItem('user_profile', JSON.stringify(profile));
                    }
                    document.getElementById('welcome-name') && (document.getElementById('welcome-name').innerText = profile.firstName || apiName);
                    applyHeaderProfile();
                }
            } catch (error) {
                console.error('Профиль қатесі:', error);
                applyHeaderProfile();
            }
        }

        function logout() {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = 'login.html';
        }
        function saveActivityMinutes(minutesSpent) {
            if (minutesSpent < 1) minutesSpent = 1;
            const activityLog = JSON.parse(localStorage.getItem('study_activity')) || {};
            const today = new Date();
            const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            
            activityLog[dateStr] = (activityLog[dateStr] || 0) + minutesSpent;
            localStorage.setItem('study_activity', JSON.stringify(activityLog));
        }
        function saveModuleResult(moduleType, score, maxScore) {
            const history = JSON.parse(localStorage.getItem('module_history')) || [];
            const today = new Date();
            const pad = (n) => n < 10 ? '0' + n : n;
            const dateStr = `${pad(today.getDate())}.${pad(today.getMonth() + 1)}.${today.getFullYear()} ${pad(today.getHours())}:${pad(today.getMinutes())}`;
            
            history.push({
                type: moduleType,
                score: score,
                maxScore: maxScore,
                date: dateStr
            });
            localStorage.setItem('module_history', JSON.stringify(history));
        }

        // 3. Мәтіндер тізімін экранға шығару
        function loadMaterials() {
            const list = document.getElementById('materialsList');
            list.innerHTML = '';
            
            if (LOCAL_MATERIALS.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted);">Мәтіндер әлі жоқ.</p>';
                return;
            }

            LOCAL_MATERIALS.forEach(mat => {
                const card = document.createElement('div');
                card.className = 'module-card';
                card.innerHTML = `
                    <div class="module-card-header">
                        <h3 class="module-title">${mat.title}</h3>
                        <span class="module-badge">${mat.level}</span>
                    </div>
                    <p class="module-description">Сөздер саны: <strong>${mat.word_count}</strong></p>
                    <button class="btn btn-primary" onclick="startTest(${mat.id})">Бастау</button>
                `;
                list.appendChild(card);
            });
        }

        function startTest(id) {
            startTime = new Date();
            currentMaterial = LOCAL_MATERIALS.find(m => m.id === id);
            if (!currentMaterial) return;

            document.getElementById('simTitle').textContent = currentMaterial.title;
            document.getElementById('simText').innerHTML = `<p>${currentMaterial.content}</p>`;

            const qContainer = document.getElementById('questionsContainer');
            qContainer.innerHTML = '';
            document.getElementById('resultBanner').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'block';

            currentMaterial.questions.forEach((q, index) => {
                const block = document.createElement('div');
                block.className = 'question-block';
                block.id = `question-block-${q.id}`;
                
                let optionsHtml = '';
                for (const [key, val] of Object.entries(q.options)) {
                    optionsHtml += `
                        <label class="option-label" id="label-${q.id}-${key}">
                            <input type="radio" name="q_${q.id}" value="${key}" required>
                            <span><strong>${key})</strong> ${val}</span>
                        </label>
                    `;
                }

                block.innerHTML = `
                    <div class="question-text">${index + 1}. ${q.text}</div>
                    ${optionsHtml}
                    <div class="explanation-box" id="exp-${q.id}"></div>
                `;
                qContainer.appendChild(block);
            });

            document.getElementById('materialsScreen').style.display = 'none';
            document.getElementById('simulatorScreen').style.display = 'flex';
        }

        function closeSimulator() {
            document.getElementById('simulatorScreen').style.display = 'none';
            document.getElementById('materialsScreen').style.display = 'block';
            document.getElementById('translationTooltip').style.display = 'none';
            currentMaterial = null;
        }

        function submitAnswers(e) {   
            e.preventDefault();
            
            if (!currentMaterial) return;

            const form = document.getElementById('questionsForm');
            const formData = new FormData(form);
            const userAnswers = {};

            for (const [key, value] of formData.entries()) {
                const questionId = parseInt(key.split('_')[1]);
                userAnswers[questionId] = value;
            }

            if (Object.keys(userAnswers).length < currentMaterial.questions.length) {
                alert('Барлық сұрақтарға жауап беріңіз!');
                return;
            }

            let score = 0;

            currentMaterial.questions.forEach(q => {
                const userAnswer = userAnswers[q.id];
                const isCorrect = (userAnswer === q.correctAnswer);
                
                if (isCorrect) score++;

                const radios = document.getElementsByName(`q_${q.id}`);
                radios.forEach(r => r.disabled = true);

                const userLabel = document.getElementById(`label-${q.id}-${userAnswer}`);
                const correctLabel = document.getElementById(`label-${q.id}-${q.correctAnswer}`);

                if (isCorrect) {
                    if (userLabel) userLabel.classList.add('correct');
                } else {
                    if (userLabel) userLabel.classList.add('wrong');
                    if (correctLabel) correctLabel.classList.add('correct');
                }

                const expBox = document.getElementById(`exp-${q.id}`);
                expBox.innerHTML = `<strong>Разбор:</strong> ${q.explanation}`;
                expBox.style.display = 'block';
            });

            const banner = document.getElementById('resultBanner');
            banner.textContent = `Нәтиже: ${score} / ${currentMaterial.questions.length} дұрыс`;
            banner.style.display = 'block';
            document.getElementById('submitBtn').style.display = 'none';
            banner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            const endTime = new Date();
            const durationMinutes = Math.max(1, Math.round((endTime - startTime) / 60000));
            saveActivityMinutes(durationMinutes);
            saveModuleResult('reading', score, currentMaterial.questions.length);
        }

        const textPane = document.getElementById('simText');
        const tooltip = document.getElementById('translationTooltip');

        document.getElementById('questionsForm').addEventListener('submit', submitAnswers);
        
        window.onload = () => {
            fetchUserProfile();
            loadMaterials();
        };
